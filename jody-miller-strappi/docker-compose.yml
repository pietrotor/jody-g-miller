services:
  postgres:
    image: postgres:16-alpine
    container_name: jody-miller-cms-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: jody_miller_cms
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: strapi_local_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U strapi -d jody_miller_cms']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
